<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Connect | #vivolojas</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --p:#6A1B9A;--ph:#5B1487;--pl:#F3E5F5;
  --bg:#F6F7FB;--card:#FFF;--brd:#E4E6EB;
  --t1:#1F2937;--t2:#6B7280;--t3:#9CA3AF;
  --ok:#16A34A;--warn:#F59E0B;--err:#DC2626;--info:#2563EB;
  --sh:0 1px 3px rgba(0,0,0,.04);--shm:0 4px 16px rgba(0,0,0,.06);--shl:0 12px 40px rgba(0,0,0,.1);
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#C4C4C4;border-radius:10px}
button{cursor:pointer;font-family:inherit}input,select,textarea{font-family:inherit}

/* === LOGIN === */
.L{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative}
.L::before{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(135deg,var(--p),#8E24AA);border-radius:0 0 0 80px}
.Lc{position:relative;z-index:1;width:400px;max-width:90%}
.Llogo{display:block;width:200px;margin:0 auto 32px;filter:brightness(0) invert(1)}
.Lbox{background:var(--card);border-radius:16px;padding:40px 32px;box-shadow:var(--shl)}
.Ltit{font-size:20px;font-weight:700;color:var(--t1);margin-bottom:2px;text-align:center}
.Lsub{font-size:13px;color:var(--t2);margin-bottom:28px;text-align:center}
.Llbl{font-size:12px;font-weight:600;color:var(--t2);display:block;margin-bottom:5px}
.Lin{width:100%;height:44px;padding:0 14px;border:1.5px solid var(--brd);border-radius:var(--r);font-size:14px;outline:0;transition:.2s;background:var(--bg);color:var(--t1);margin-bottom:16px}
.Lin:focus{border-color:var(--p);background:var(--card);box-shadow:0 0 0 3px rgba(106,27,154,.1)}
.Lbtn{width:100%;height:44px;border-radius:var(--r);font-size:14px;font-weight:700;border:0;color:#fff;background:var(--p);transition:.2s;margin-top:4px}
.Lbtn:hover{background:var(--ph);box-shadow:0 6px 20px rgba(106,27,154,.3);transform:translateY(-1px)}
.Lerr{color:var(--err);font-size:12px;font-weight:500;margin-top:10px;min-height:16px;text-align:center}
.Lft{text-align:center;margin-top:24px;font-size:11px;color:var(--t3)}
.Lft b{color:var(--t2)}

/* === HEADER === */
.H{background:var(--card);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--brd);box-shadow:var(--sh)}
.Htop{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:52px}
.Hlogo{height:32px}
.Ha{display:flex;align-items:center;gap:10px}
.Hsel{background:var(--bg);color:var(--t1);border:1px solid var(--brd);border-radius:var(--r);padding:0 12px;height:36px;font-size:12px;font-weight:600;outline:0}
.Hsel:focus{border-color:var(--p)}
.Hnav{display:flex;padding:0 28px;gap:0;border-top:1px solid var(--brd)}
.Ht{background:0;color:var(--t2);border:0;border-bottom:2px solid transparent;padding:0 18px;height:40px;font-size:12px;font-weight:600;transition:.15s;display:flex;align-items:center;white-space:nowrap}
.Ht.on{color:var(--p);border-bottom-color:var(--p)}
.Ht:hover:not(.on){color:var(--t1);background:var(--bg)}

/* === BUTTONS === */
.B{background:var(--p);color:#fff;border:0;border-radius:var(--r);height:36px;padding:0 16px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:.15s}
.B:hover{background:var(--ph);box-shadow:var(--shm)}
.Bs{background:var(--card);color:var(--t1);border:1px solid var(--brd);border-radius:var(--r);height:36px;padding:0 14px;font-size:12px;font-weight:500;display:inline-flex;align-items:center}
.Bd{background:var(--err);color:#fff;border:0;border-radius:var(--r);height:32px;padding:0 12px;font-size:11px;font-weight:600}
.Bout{background:0;color:var(--t3);border:1px solid var(--brd);border-radius:var(--r);height:34px;padding:0 12px;font-size:11px;font-weight:500}
.Bout:hover{border-color:var(--err);color:var(--err)}

/* === USER === */
.Ui{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:500;color:var(--t1)}
.Ur{padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:#fff}
.Ur.admin{background:#1F2937}.Ur.diretor{background:var(--p)}.Ur.analista{background:var(--info)}.Ur.gerente{background:var(--warn);color:#78350F}.Ur.vendedor{background:var(--brd);color:var(--t2)}

/* === MAIN === */
.M{padding:28px 32px;max-width:1400px;margin:0 auto}

/* === FILTERS === */
.F{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;align-items:center;padding:10px 16px;background:var(--card);border-radius:var(--rl);border:1px solid var(--brd)}
.Fsel{height:36px;padding:0 12px;border:1px solid var(--brd);border-radius:var(--r);font-size:12px;background:var(--card);min-width:140px;outline:0;font-weight:500;color:var(--t1)}
.Fsel:focus{border-color:var(--p)}

/* === KPI CARDS === */
.K{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:28px}
.Kc{background:var(--card);border-radius:var(--rl);padding:20px;min-height:100px;border:1px solid var(--brd);box-shadow:var(--sh);display:flex;flex-direction:column;justify-content:center;transition:.2s}
.Kc:hover{box-shadow:var(--shm);transform:translateY(-2px)}
.Kl{font-size:12px;color:var(--t2);font-weight:500;margin-bottom:8px}
.Kv{font-size:28px;font-weight:700;line-height:1;letter-spacing:-.5px}
.Ks{font-size:11px;color:var(--t2);margin-top:6px}
.Kbar{background:#E5E7EB;border-radius:20px;height:5px;overflow:hidden;margin-top:8px}
.Kfill{height:100%;background:var(--p);border-radius:20px;transition:width .6s}

/* === GRID === */
.G2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.G13{display:grid;grid-template-columns:1fr 2fr;gap:20px;margin-bottom:24px}

/* === CARD === */
.C{background:var(--card);border-radius:var(--rl);padding:24px;border:1px solid var(--brd);box-shadow:var(--sh)}
.Ct{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--t1)}

/* === TABLE === */
.Tw{background:var(--card);border-radius:var(--rl);border:1px solid var(--brd);overflow-x:auto;box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg);color:var(--t2);padding:10px 8px;font-weight:600;text-align:center;white-space:nowrap;font-size:11px;border-bottom:1px solid var(--brd);text-transform:uppercase;letter-spacing:.3px}
th.stl{position:sticky;left:0;z-index:2;background:var(--bg);min-width:100px;text-align:left;padding-left:16px}
th.str{position:sticky;right:0;z-index:2;background:var(--pl);color:var(--p);min-width:80px}
td{padding:8px;text-align:center;border-bottom:1px solid var(--brd)}
td.stl{position:sticky;left:0;z-index:1;padding-left:16px;text-align:left;font-weight:500;background:inherit}
td.str{position:sticky;right:0;z-index:1;font-weight:600;background:#FAFBFF}
.secr td{background:var(--p);color:#fff;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:6px 16px}
.totr td{background:var(--bg);color:var(--t1);font-weight:600;border-top:2px solid var(--brd)}.totr td.stl{background:var(--bg)}.totr td.str{background:var(--pl);color:var(--p)}
.re td{background:var(--card)}.ro td{background:#FAFBFC}
.re td.stl{background:var(--card)}.ro td.stl{background:#FAFBFC}
.re td.str,.ro td.str{background:#FAFBFF}
td.ed{cursor:pointer;transition:.15s}td.ed:hover{background:var(--pl)!important;outline:2px solid var(--p);outline-offset:-1px;border-radius:2px}
.wth{color:var(--p)!important}

/* CRM TABLE */
.clt{width:100%;border-collapse:collapse;font-size:12px}
.clt th{background:var(--bg);color:var(--t2);padding:10px 12px;text-align:left;font-weight:600;font-size:11px;border-bottom:2px solid var(--brd);text-transform:uppercase;letter-spacing:.3px}
.clt td{padding:10px 12px;border-bottom:1px solid var(--brd)}.clt tr:hover td{background:var(--pl)}

/* RANKING */
.ri{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--brd)}.ri:last-child{border-bottom:0}
.rn{width:32px;height:32px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0}

/* BADGE */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-p{background:#DCFCE7;color:var(--ok)}.badge-n{background:#FEF9C3;color:#92400E}

/* TAG */
.tag{display:inline-flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:4px 12px;font-size:11px;font-weight:500;margin:2px}
.tag-x{background:0;border:0;color:var(--err);font-size:13px;font-weight:700;line-height:1}

/* === MODAL === */
.mo{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;animation:fi .12s}
.ml{background:var(--card);border-radius:16px;padding:32px;min-width:400px;max-width:640px;width:92%;max-height:90vh;overflow-y:auto;box-shadow:var(--shl);animation:su .2s}
.mth{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--brd)}
.mth h2{font-size:17px;font-weight:700}
.mxb{background:var(--bg);border:1px solid var(--brd);width:34px;height:34px;border-radius:var(--r);font-size:15px;color:var(--t3);display:flex;align-items:center;justify-content:center;transition:.15s}
.mxb:hover{background:var(--err);color:#fff;border-color:var(--err)}

/* FORM */
.fg{margin-bottom:16px}
.fl{font-size:11px;font-weight:600;display:block;margin-bottom:5px;color:var(--t2);text-transform:uppercase;letter-spacing:.3px}
.fi,.fs{width:100%;height:40px;padding:0 12px;border:1.5px solid var(--brd);border-radius:var(--r);font-size:13px;outline:0;transition:.15s;background:var(--card);color:var(--t1)}
.fi:focus,.fs:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(106,27,154,.08)}
.fr{display:flex;gap:12px}.fr>*{flex:1}
.bf{width:100%;height:44px;border-radius:var(--r);font-size:14px;font-weight:600;border:0;color:#fff;display:flex;align-items:center;justify-content:center;transition:.15s}
.bf:hover{transform:translateY(-1px)}
.bfp{background:var(--p)}.bfp:hover{background:var(--ph)}
.bfd{background:var(--err)}.bfd:hover{background:#B91C1C}

/* CONFIG */
.cfg-s{background:var(--card);border-radius:var(--rl);padding:24px;border:1px solid var(--brd);margin-bottom:16px;box-shadow:var(--sh)}
.cfg-t{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:12px}
.cfg-ar{display:flex;gap:8px;margin-top:8px}
.cfg-ar input,.cfg-ar select{flex:1;height:40px;padding:0 12px;border:1.5px solid var(--brd);border-radius:var(--r);font-size:12px;outline:0;background:var(--card)}
.cfg-ar input:focus{border-color:var(--p)}
.cfg-ar button{height:40px;padding:0 16px;background:var(--p);color:#fff;border:0;border-radius:var(--r);font-size:12px;font-weight:600;white-space:nowrap}
.cfg-ar button:hover{background:var(--ph)}

.meta-tbl{width:100%;border-collapse:collapse;margin-top:8px}
.meta-tbl th{background:var(--bg);color:var(--t2);padding:8px;font-size:10px;text-align:center;border:1px solid var(--brd);font-weight:600}
.meta-tbl td{padding:3px;border:1px solid var(--brd)}
.meta-tbl input{width:100%;height:34px;padding:0 6px;border:1px solid var(--brd);border-radius:6px;font-size:11px;text-align:center;outline:0}
.meta-tbl input:focus{border-color:var(--p)}

.pcal{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.pmon{border-radius:var(--rl);padding:12px 8px;text-align:center;cursor:pointer;transition:.15s;border:1.5px solid var(--brd);font-size:11px;font-weight:500}
.pmon:hover{border-color:var(--p);box-shadow:var(--shm);transform:translateY(-2px)}
.pmon.paid{background:#DCFCE7;border-color:var(--ok);color:var(--ok)}
.pmon.pending{background:#FEF9C3;border-color:var(--warn);color:#92400E}
.pmon.future{background:var(--bg);border-color:var(--brd);color:var(--t3)}
.pm-m{font-size:9px;font-weight:700;text-transform:uppercase;margin-bottom:3px}
.pm-v{font-size:14px;font-weight:700}.pm-s{font-size:9px;margin-top:2px}

.toast{position:fixed;top:60px;right:16px;z-index:2000;padding:12px 20px;border-radius:var(--r);font-weight:500;font-size:13px;box-shadow:var(--shl);animation:si .2s;color:#fff}
.ts{background:var(--ok)}.te{background:var(--err)}

@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes si{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}

@media(max-width:1100px){.K{grid-template-columns:repeat(3,1fr)}.G2,.G13{grid-template-columns:1fr}.M{padding:16px}}
@media(max-width:768px){.K{grid-template-columns:1fr 1fr}.Htop{padding:0 16px}.Hnav{padding:0 16px;overflow-x:auto}.login-left{display:none}}
</style>
</head>

const API_BASE=window.location.port==='5500'||window.location.port==='5501'?'http://localhost:3000':'';
async function api(method, path, body){
  const token=localStorage.getItem('msc_token');
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(token)opts.headers['Authorization']=`Bearer ${token}`;
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(API_BASE+'/api'+path,opts);
  if(!r.ok){const e=await r.json().catch(()=>({}));const err=new Error(e.error||r.status);err.apiBody=e;throw err}
  return r.json();
}

async function ld(){
  try{
    const token=localStorage.getItem('msc_token');
    if(!token)return;
    const [stores,sellers,planos,aparelhos,acessorios,servicos,tipos,users,metas,waConfig,waLogs]=await Promise.all([
      api('GET','/catalog/stores'),
      api('GET','/catalog/sellers'),
      api('GET','/catalog/planos'),
      api('GET','/catalog/aparelhos'),
      api('GET','/catalog/acessorios'),
      api('GET','/catalog/servicos'),
      api('GET','/catalog/tipos'),
      api('GET','/users'),
      api('GET','/metas?year=2026'),
      api('GET','/whatsapp/config').catch(()=>null),
      api('GET','/whatsapp/logs').catch(()=>[]),
    ]);
    S.stores=stores.map(s=>s.name);
    _storeIdMap={};stores.forEach(s=>{_storeIdMap[s.name]=s.id});
    S.sellers=sellers.map(s=>s.name);
    S.sellerStore={};_sellerIdMap={};
    sellers.forEach(s=>{_sellerIdMap[s.name]=s.id;if(s.store)S.sellerStore[s.name]=s.store});
    S.planos=planos.map(p=>({name:p.name,value:parseFloat(p.value)||0,obs:p.obs||'',_id:p.id}));
    _planIdMap={};planos.forEach(p=>{_planIdMap[p.name]=p.id});
    S.aparelhos=aparelhos.map(p=>({name:p.name,value:parseFloat(p.value)||0,obs:p.obs||'',_id:p.id}));
    _apIdMap={};aparelhos.forEach(p=>{_apIdMap[p.name]=p.id});
    S.accessories=acessorios.map(p=>({name:p.name,value:parseFloat(p.value)||0,obs:p.obs||'',_id:p.id}));
    _accIdMap={};acessorios.forEach(p=>{_accIdMap[p.name]=p.id});
    S.services=servicos.length?servicos.map(s=>s.name):[...DEF_SVC];
    _svcIdMap={};servicos.forEach(s=>{_svcIdMap[s.name]=s.id});
    S.tipos=tipos.length?tipos.map(t=>t.name):[...DEF_TIPO];
    _tipoIdMap={};tipos.forEach(t=>{_tipoIdMap[t.name]=t.id});
    S.users=users.map(u=>({...u,_id:u.id}));
    S.metas=metas;
    if(waConfig){S.waConfig={numbers:waConfig.numbers||[],reportItems:waConfig.report_items||{},horario:waConfig.horario||'18:00',ativo:!!waConfig.ativo,apiEndpoint:waConfig.api_endpoint||'',formato:waConfig.formato||'texto',waToken:waConfig.wa_token||'',waId:waConfig.wa_id||''}}
    S.waLogs=Array.isArray(waLogs)?waLogs:[];
    await ldMonth();
  }catch(e){console.error('ld error',e)}
}

async function ldMonth(){
  const [salesRows,cancelRows,recordRows,clientRows]=await Promise.all([
    api('GET',`/sales?month=${cm}&year=2026`),
    api('GET',`/sales/cancellations?month=${cm}&year=2026`),
    api('GET',`/sales/records?month=${cm}&year=2026`),
    api('GET','/clients'),
  ]);
  S.sales={};_saleIdMap={};
  salesRows.forEach(r=>{const k=skk(r.seller,r.day,r.month);S.sales[k]=parseFloat(r.value)||0;_saleIdMap[k]=r.id});
  S.cancellations={};
  cancelRows.forEach(r=>{S.cancellations[`${r.seller}|${r.day}|${r.month}`]=parseFloat(r.value)||0});
  S.saleRecords=recordRows.map(r=>({...r,month:r.month,day:r.day,date:r.date,seller:r.seller,store:r.store,service:r.service,tipo:r.tipo,clientName:r.client_name,cpf:r.cpf,plan:r.plan,value:parseFloat(r.value)||0,aparelho:r.aparelho,acessorio:r.acessorio,accessNumber:r.access_number,bko:r.bko,metaCat:r.meta_cat,status:r.status,_id:r.id}));
  S.clients=clientRows.map(c=>({...c,_id:c.id,dueDay:c.due_day,tipoPessoa:c.tipo_pessoa,birthDate:c.birth_date,payments:c.payments||{}}));
}

const dim=m=>new Date(2026,m+1,0).getDate(),dnm=(d,m)=>DN[new Date(2026,m,d).getDay()],iw=(d,m)=>{const w=new Date(2026,m,d).getDay();return w===0||w===6};
const skk=(s,d,m)=>`${s}|${d}|${m}|v`,gs=(s,d,m)=>S.sales[skk(s,d,m)]||0,gc=(s,d,m)=>S.cancellations[`${s}|${d}|${m}`]||0;

const gM=(m,c)=>(S.metas[m]&&S.metas[m][c])||0,gMT=m=>{let t=0;MC.forEach(c=>t+=gM(m,c));return t};

const sA=()=>isA()||isD()||isAn(),cC=()=>isA()||isAn(),cU=()=>isA()||isAn(),cD=()=>isA()||isAn();

function gAS(){if(sA())return F.seller?[F.seller]:(F.store?s4s(F.store):S.sellers);if(isG())return s4s(CU.store);if(isV())return[CU.name];return S.sellers}
function gSt(){if(sA())return F.store||'';if(isG())return CU.store;return''}

function calc(){
const m=cm,d=dim(m),mt=gMT(m);let tN=0,tC=0;const bs={};const dT=Array(d).fill(0);const sl=gAS();
sl.forEach(s=>{bs[s]={total:0,cancel:0,daily:Array(d).fill(0)};for(let i=1;i<=d;i++){const n=gs(s,i,m),c=gc(s,i,m);bs[s].total+=n;bs[s].cancel+=c;bs[s].daily[i-1]=n;tN+=n;tC+=c;dT[i-1]+=n}});
const at=mt>0?tN/mt:0,fM=Math.max(0,mt-tN);const rk=Object.entries(bs).map(([name,v])=>({name,...v})).sort((a,b)=>b.total-a.total);

// MODAL HELPERS
function shM(h){const e=document.createElement('div');e.className='mo';e.id='mo';e.innerHTML=`<div class="ml">${h}</div>`;e.onclick=ev=>{if(ev.target===e)clM()};document.body.appendChild(e)}
function clM(){document.getElementById('mo')?.remove()}

// TOAST
function tt(m,t='ts'){const e=document.createElement('div');e.className=`toast ${t}`;e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),2500)}

// NOVA VENDA MODAL

const stO=(isG()?[CU.store]:S.stores).map(s=>`<option value="${s}">${s}</option>`).join('');
const seO=(isV()?[CU.name]:(isG()?s4s(CU.store):S.sellers)).map(s=>`<option value="${s}">${s}</option>`).join('');
const dd=Array.from({length:d},(_,i)=>`<option value="${i+1}"${i+1===td?' selected':''}>${i+1} - ${dnm(i+1,cm)}</option>`).join('');
const svcO=(S.services||DEF_SVC).map(s=>`<option value="${s}">${s}</option>`).join('');
const tipoO=(S.tipos||DEF_TIPO).map(s=>`<option value="${s}">${s}</option>`).join('');
const planO=S.planos.map(p=>`<option value="${p.name}" data-v="${p.value}">${p.name} - ${fmt(p.value)}</option>`).join('');
const apO=S.aparelhos.map(p=>`<option value="${p.name}" data-v="${p.value}">${p.name} - ${fmt(p.value)}</option>`).join('');
const accO=S.accessories.map(p=>`<option value="${p.name}" data-v="${p.value}">${p.name} - ${fmt(p.value)}</option>`).join('');
const cliO=S.clients.map(c=>`<option value="${c.name}">${c.name}${c.cpf?' ('+c.cpf+')':''}</option>`).join('');
shM(`<div class="mth"><h2>Nova Venda</h2><button class="mxb" onclick="clM()">x</button></div>
<div class="fr"><div class="fg"><label class="fl">Loja</label><select class="fs" id="vSt" onchange="fVS()"><option value="">--</option>${stO}</select></div><div class="fg"><label class="fl">Vendedor</label><select class="fs" id="vSe">${seO}</select></div></div>
<div class="fg"><label class="fl">Cliente</label><div style="display:flex;gap:8px"><select class="fs" id="vCli" style="flex:1"><option value="">--</option>${cliO}</select>${!isV()?`<button class="B" onclick="clM();oCli()">+ Novo</button>`:''}</div></div>
<div class="fr"><div class="fg"><label class="fl">Servico</label><select class="fs" id="vSvc"><option value="">--</option>${svcO}</select></div><div class="fg"><label class="fl">Tipo</label><select class="fs" id="vTipo" onchange="onTCh()"><option value="">--</option>${tipoO}</select></div></div>
<div id="tipoX"></div>
${S.planos.length?`<div class="fg"><label class="fl">Categoria (Plano)</label><select class="fs" id="vCat" onchange="aCat()"><option value="">-- Selecionar --</option>${planO}</select></div>`:''}
${S.aparelhos.length?`<div class="fg"><label class="fl">Produto (Aparelho)</label><select class="fs" id="vProd" onchange="aProd()"><option value="">-- Nenhum --</option>${apO}</select></div>`:''}
${S.accessories.length?`<div class="fg"><label class="fl">Acessorio</label><select class="fs" id="vAcc" onchange="aAcc()"><option value="">-- Nenhum --</option>${accO}</select></div>`:''}
<div class="fg"><label class="fl">Categoria Meta</label><select class="fs" id="vMCat"><option value="">--</option>${MC.map(c=>`<option>${c}</option>`).join('')}</select></div>
<div class="fr"><div class="fg"><label class="fl">Vencimento da Fatura</label><select class="fs" id="vDay">${dd}</select></div><div class="fg"><label class="fl">Valor (R$)</label><input class="fi" type="number" id="vVal" placeholder="0"></div></div>
<div class="fr"><div class="fg"><label class="fl">N. Acesso</label><input class="fi" id="vAcN"></div><div class="fg"><label class="fl">BKO</label><input class="fi" id="vBko"></div></div>
<button class="bf bfp" onclick="doNS()">Registrar Venda</button>`)}

window.fVS=function(){const st=document.getElementById('vSt').value;document.getElementById('vSe').innerHTML=(st?s4s(st):S.sellers).map(s=>`<option>${s}</option>`).join('')}
window.onTCh=function(){const t=document.getElementById('vTipo').value,b=document.getElementById('tipoX');
if(t==='Troca de Plano')b.innerHTML=`<div class="fr"><div class="fg"><label class="fl">Plano Antigo</label><input class="fi" id="vOP"></div><div class="fg"><label class="fl">Plano Novo</label><input class="fi" id="vNP"></div></div>`;
else if(t==='Troca de Simcard'||t==='Migracao'){const o=S.planos.map(p=>`<option>${p.name}</option>`).join('');b.innerHTML=`<div class="fg"><label class="fl">Plano do Cliente</label><select class="fs" id="vCP"><option>--</option>${o}</select></div>`}
else b.innerHTML=''}
window.aCat=function(){const s=document.getElementById('vCat');if(s?.value){const v=document.getElementById('vVal');if(!v.value||v.value==='0')v.value=s.options[s.selectedIndex].dataset.v}}
window.aProd=function(){const s=document.getElementById('vProd');if(s?.value){const v=document.getElementById('vVal');if(!v.value||v.value==='0')v.value=s.options[s.selectedIndex].dataset.v}}
window.aAcc=function(){const s=document.getElementById('vAcc');if(s?.value){const v=document.getElementById('vVal');if(!v.value||v.value==='0')v.value=s.options[s.selectedIndex].dataset.v}}
window.doNS=async function(){
  const seller=document.getElementById('vSe')?.value,store=document.getElementById('vSt')?.value,day=+document.getElementById('vDay')?.value,value=parseFloat(document.getElementById('vVal')?.value);
  if(!seller||!value||value<=0){tt('Preencha vendedor e valor','te');return}
  const cli=document.getElementById('vCli')?.value||'',cObj=S.clients.find(c=>c.name===cli);
  try{
    await api('POST','/sales',{seller,day,month:cm,year:2026,value});
    await api('POST','/sales/records',{month:cm,day,date:`${String(day).padStart(2,'0')}/${String(cm+1).padStart(2,'0')}/2026`,seller,store,service:document.getElementById('vSvc')?.value||'',tipo:document.getElementById('vTipo')?.value||'',clientName:cli,cpf:cObj?.cpf||'',plan:document.getElementById('vCat')?.value||document.getElementById('vNP')?.value||document.getElementById('vCP')?.value||'',value,aparelho:document.getElementById('vProd')?.value||'',acessorio:document.getElementById('vAcc')?.value||'',accessNumber:document.getElementById('vAcN')?.value||'',bko:document.getElementById('vBko')?.value||'',metaCat:document.getElementById('vMCat')?.value||'',status:'OK',year:2026});
    await ldMonth();clM();tt(`${fmt(value)} registrada!`);R();
  }catch(e){tt('Erro: '+e.message,'te')}
}

// CANCEL
function oCM(){if(!cD())return;const d=dim(cm),td=Math.min(new Date().getDate(),d);
shM(`<div class="mth"><h2>Cancelamento</h2><button class="mxb" onclick="clM()">x</button></div><div class="fg"><label class="fl">Vendedor</label><select class="fs" id="cS">${gAS().map(s=>`<option>${s}</option>`).join('')}</select></div><div class="fr"><div class="fg"><label class="fl">Dia</label><select class="fs" id="cD">${Array.from({length:d},(_,i)=>`<option value="${i+1}"${i+1===td?' selected':''}>${i+1}</option>`).join('')}</select></div><div class="fg"><label class="fl">Valor</label><input class="fi" type="number" id="cV" placeholder="0"></div></div><button class="bf bfd" onclick="doCan()">Registrar</button>`)}
window.doCan=async function(){
  const s=document.getElementById('cS').value,d=+document.getElementById('cD').value,v=parseFloat(document.getElementById('cV').value);
  if(!s||!v||v<=0)return;
  try{
    await api('POST','/sales/cancellations',{seller:s,day:d,month:cm,year:2026,value:v});
    await ldMonth();clM();tt('Cancelamento registrado','te');R();
  }catch(e){tt('Erro: '+e.message,'te')}
}

// EDIT VENDA
window.oES=function(s,d,v){if(!cD())return;shM(`<div class="mth"><h2>Editar</h2><button class="mxb" onclick="clM()">x</button></div><div style="background:var(--bg);border-radius:var(--rl);padding:14px;margin-bottom:16px;font-size:13px"><b>${s}</b> - Dia ${d}</div><div class="fg"><label class="fl">Valor</label><input class="fi" type="number" id="eV" value="${v}" style="text-align:center;font-size:18px;font-weight:700"></div><div style="display:flex;gap:8px"><button class="bf bfp" style="flex:2" onclick="doES('${s}',${d})">Salvar</button><button class="bf bfd" style="flex:1" onclick="doDS('${s}',${d})">Zerar</button></div>`);document.getElementById('eV').select()}
window.doES=async function(s,d){
  const v=parseFloat(document.getElementById('eV').value),k=skk(s,d,cm);
  if(isNaN(v)||v<0)return;
  const id=_saleIdMap[k];
  try{
    if(id)await api('PUT',`/sales/${id}`,{value:v});
    else if(v>0)await api('POST','/sales',{seller:s,day:d,month:cm,year:2026,value:v});
    await ldMonth();clM();tt('Atualizado!');R();
  }catch(e){tt('Erro: '+e.message,'te')}
}
window.doDS=async function(s,d){
  const k=skk(s,d,cm),id=_saleIdMap[k];
  try{
    if(id)await api('DELETE',`/sales/${id}`);
    await ldMonth();clM();tt('Zerado');R();
  }catch(e){tt('Erro: '+e.message,'te')}
}
window.dS=async function(k){
  if(!confirm('Excluir?'))return;
  const id=_saleIdMap[k];
  try{
    if(id)await api('DELETE',`/sales/${id}`);
    await ldMonth();tt('Excluido');R();
  }catch(e){tt('Erro: '+e.message,'te')}
}
window.delRec=async function(i){
  if(!confirm('Excluir?'))return;
  const rec=S.saleRecords[i];
  try{
    if(rec?._id)await api('DELETE',`/sales/records/${rec._id}`);
    await ldMonth();tt('Removido');R();
  }catch(e){tt('Erro: '+e.message,'te')}
}

// CLIENT
function oCli(){const so=gAS().map(s=>`<option>${s}</option>`).join(''),stO=(isG()?[CU.store]:S.stores).map(s=>`<option>${s}</option>`).join('');
const dd=Array.from({length:31},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('');
const planO=S.planos.map(p=>`<option value="${p.name}" data-v="${p.value}">${p.name} - ${fmt(p.value)}</option>`).join('');
shM(`<div class="mth"><h2>Cadastrar Cliente</h2><button class="mxb" onclick="clM()">x</button></div>
<div class="fr"><div class="fg"><label class="fl">Tipo Pessoa</label><select class="fs" id="clTP"><option>Pessoa Fisica</option><option>Pessoa Juridica</option></select></div><div class="fg"><label class="fl">CPF / CNPJ</label><input class="fi" id="clCPF"></div></div>
<div class="fg"><label class="fl">Nome / Empresa</label><input class="fi" id="clN"></div>
<div class="fr"><div class="fg"><label class="fl">Nascimento</label><input class="fi" type="date" id="clDN"></div><div class="fg"><label class="fl">Sexo</label><select class="fs" id="clSx"><option value="">--</option><option>Masculino</option><option>Feminino</option></select></div></div>
${S.planos.length?`<div class="fg"><label class="fl">Plano</label><select class="fs" id="clPS" onchange="if(this.value){document.getElementById('clP').value=this.value;document.getElementById('clV').value=this.options[this.selectedIndex].dataset.v}"><option value="">--</option>${planO}</select></div>`:''}
<div class="fr"><div class="fg"><label class="fl">Produto/Plano</label><input class="fi" id="clP"></div><div class="fg"><label class="fl">Valor</label><input class="fi" type="number" id="clV" placeholder="0"></div></div>
<div class="fr"><div class="fg"><label class="fl">Vendedor</label><select class="fs" id="clS"><option value="">--</option>${so}</select></div><div class="fg"><label class="fl">Loja</label><select class="fs" id="clSt"><option value="">--</option>${stO}</select></div></div>
<div class="fg"><label class="fl">Vencimento da Fatura</label><select class="fs" id="clDD">${dd}</select></div>
<div style="background:var(--bg);border-radius:var(--rl);padding:16px;margin-bottom:16px"><div style="font-size:11px;font-weight:700;color:var(--t2);margin-bottom:10px">ENDERECO</div>
<div class="fr"><div class="fg"><label class="fl">CEP</label><input class="fi" id="clCEP"></div><div class="fg"><label class="fl">UF</label><input class="fi" id="clUF"></div><div class="fg"><label class="fl">Cidade</label><input class="fi" id="clCity"></div></div>
<div class="fr"><div class="fg"><label class="fl">Rua</label><input class="fi" id="clRua"></div><div class="fg"><label class="fl">Bairro</label><input class="fi" id="clBairro"></div></div>
<div class="fr"><div class="fg"><label class="fl">N.</label><input class="fi" id="clNum"></div><div class="fg" style="display:flex;align-items:flex-end"><label style="font-size:11px;display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="clSN"> Sem Numero</label></div></div></div>
<div class="fr"><div class="fg"><label class="fl">E-mail</label><input class="fi" id="clE"></div><div class="fg"><label class="fl">Telefone</label><input class="fi" id="clT"></div></div>
<div class="fg"><label class="fl">2o Telefone</label><input class="fi" id="clT2"></div>
<button class="bf bfp" onclick="doAC()">Cadastrar</button>`)}
window.doAC=async function(){
  const n=document.getElementById('clN').value.trim();if(!n){tt('Preencha o nome','te');return}
  try{
    await api('POST','/clients',{name:n,product:document.getElementById('clP').value.trim()||'--',value:parseFloat(document.getElementById('clV').value)||0,seller:document.getElementById('clS').value,store:document.getElementById('clSt')?.value||'',dueDay:+document.getElementById('clDD').value||1,tipoPessoa:document.getElementById('clTP').value,cpf:document.getElementById('clCPF').value.trim(),birthDate:document.getElementById('clDN').value,sexo:document.getElementById('clSx').value,cep:document.getElementById('clCEP').value.trim(),uf:document.getElementById('clUF').value.trim(),city:document.getElementById('clCity').value.trim(),rua:document.getElementById('clRua').value.trim(),bairro:document.getElementById('clBairro').value.trim(),numero:document.getElementById('clSN')?.checked?'S/N':document.getElementById('clNum').value.trim(),email:document.getElementById('clE').value.trim(),phone:document.getElementById('clT').value.trim(),phone2:document.getElementById('clT2').value.trim()});
    await ldMonth();clM();tt(`${n} cadastrado!`);R();
  }catch(e){tt('Erro: '+e.message,'te')}
}
window.dlCli=async function(i){
  if(!cD()){tt('Sem permissao','te');return}
  const c=S.clients[i];if(!confirm(`Remover ${c?.name}?`))return;
  try{
    if(c?._id)await api('DELETE',`/clients/${c._id}`);
    await ldMonth();tt('Removido');R();
  }catch(e){tt('Erro: '+e.message,'te')}
}

// PAYMENT
window.cfPay=async function(i){
  const c=S.clients[i];if(!c)return;
  try{
    await api('POST',`/clients/${c._id}/pay`,{month:cm,year:2026});
    await ldMonth();tt(`${c.name} - ${fmt(c.value)}`);R();
  }catch(e){tt('Erro: '+e.message,'te')}
}
window.undoPay=async function(i){
  const c=S.clients[i];if(!c?.payments||c.payments[cm]!=='paid')return;
  if(!cD()){tt('Sem permissao','te');return}
  try{
    await api('DELETE',`/clients/${c._id}/pay`,{month:cm,year:2026});
    await ldMonth();tt('Desfeito','te');R();
  }catch(e){tt('Erro: '+e.message,'te')}
}
window.openCal=function(i){const c=S.clients[i];if(!c)return;if(!c.payments)c.payments={};
shM(`<div class="mth"><h2>${c.name}</h2><button class="mxb" onclick="clM()">x</button></div><div style="background:var(--bg);border-radius:var(--rl);padding:12px;margin-bottom:12px;font-size:13px"><b>${c.product}</b> - ${fmt(c.value)}/mes</div><div class="pcal">${M3.map((m,mi)=>{const st=c.payments[mi]||'',cls=st==='paid'?'paid':mi<=cm?'pending':'future';return`<div class="pmon ${cls}" onclick="tgP(${i},${mi})"><div class="pm-m">${m}</div><div class="pm-v">${fmt(c.value)}</div><div class="pm-s">${st==='paid'?'Pago':mi<=cm?'Pendente':'--'}</div></div>`}).join('')}</div>`)}
window.tgP=async function(i,mi){
  const c=S.clients[i];if(!c.payments)c.payments={};
  const was=c.payments[mi]==='paid';
  if(was&&!cD()){tt('Sem permissao','te');return}
  try{
    if(was)await api('DELETE',`/clients/${c._id}/pay`,{month:mi,year:2026});
    else await api('POST',`/clients/${c._id}/pay`,{month:mi,year:2026});
    await ldMonth();clM();openCal(i);
  }catch(e){tt('Erro: '+e.message,'te')}
}

window.edUser=function(i){const u=S.users[i];if(!u)return;const stO=S.stores.map(s=>`<option${s===u.store?' selected':''}>${s}</option>`).join(''),rO=ROLES.map(r=>`<option value="${r}"${r===u.role?' selected':''}>${RL[r]}</option>`).join('');
shM(`<div class="mth"><h2>Editar</h2><button class="mxb" onclick="clM()">x</button></div><div class="fg"><label class="fl">Nome</label><input class="fi" id="uN" value="${u.name}"></div><div class="fr"><div class="fg"><label class="fl">Login</label><input class="fi" id="uL" value="${u.login}"></div><div class="fg"><label class="fl">Nova Senha</label><input class="fi" id="uP" type="password" placeholder="vazio = manter"></div></div><div class="fr"><div class="fg"><label class="fl">Perfil</label><select class="fs" id="uR">${rO}</select></div><div class="fg"><label class="fl">Loja</label><select class="fs" id="uSt"><option value="">Todas</option>${stO}</select></div></div><div class="fg"><label class="fl">Status</label><select class="fs" id="uAct"><option value="true"${u.active!==false?' selected':''}>Ativo</option><option value="false"${u.active===false?' selected':''}>Inativo</option></select></div><button class="bf bfp" onclick="doEU(${i})">Salvar</button>`)}
window.doEU=async function(i){
  const u=S.users[i];const body={name:document.getElementById('uN').value.trim(),login:document.getElementById('uL').value.trim().toLowerCase(),role:document.getElementById('uR').value,store:document.getElementById('uSt').value,active:document.getElementById('uAct').value==='true'};
  const p=document.getElementById('uP').value;if(p)body.password=p;
  try{
    await api('PUT',`/users/${u._id||u.id}`,body);
    S.users=await api('GET','/users');clM();tt('Atualizado!');R();
  }catch(e){tt('Erro: '+e.message,'te')}
}
window.dlUser=async function(i){
  const u=S.users[i];if(u.role==='admin'){tt('Nao pode excluir admin','te');return}
  if(!confirm(`Excluir ${u.name}?`))return;
  try{
    await api('DELETE',`/users/${u._id||u.id}`);
    S.users=await api('GET','/users');tt('Removido');R();
  }catch(e){tt('Erro: '+e.message,'te')}
}

window.impSe=async function(){const raw=document.getElementById('csvSe').value.trim();if(!raw)return;
const items=[];raw.split('\n').filter(l=>l.trim()).forEach(l=>{const p=l.split(';'),nm=p[0].trim(),lj=(p[1]||'').trim();if(nm)items.push({name:nm,store:lj})});
if(!items.length)return;
try{
  await api('POST','/catalog/sellers/batch',{items});
  for(const it of items){const lg=it.name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'.').replace(/[^a-z0-9.]/g,'');try{await api('POST','/users',{name:it.name,login:lg,password:'123456',role:'vendedor',store:it.store||''})}catch{}}
  const rows=await api('GET','/catalog/sellers');S.sellers=rows.map(s=>s.name);S.sellerStore={};_sellerIdMap={};rows.forEach(s=>{_sellerIdMap[s.name]=s.id;if(s.store)S.sellerStore[s.name]=s.store});
  tt(`${items.length} vendedores (senha: 123456)`);R();
}catch(e){tt('Erro: '+e.message,'te')}}
async function impCSV(endpoint,localField,id){const raw=document.getElementById(id).value.trim();if(!raw)return;
const items=[];raw.split('\n').filter(l=>l.trim()).forEach(l=>{const p=l.split(';');if(p.length>=2){const nm=p[0].trim(),v=parseFloat(p[1].trim());if(nm&&v>0)items.push({name:nm,value:v,obs:(p[2]||'').trim()})}});
if(!items.length)return;
try{
  await api('POST',`/catalog/${endpoint}/batch`,{items});
  const rows=await api('GET',`/catalog/${endpoint}`);
  S[localField]=rows.map(p=>({name:p.name,value:parseFloat(p.value)||0,obs:p.obs||'',_id:p.id}));
  const idMap={};rows.forEach(p=>{idMap[p.name]=p.id});
  if(endpoint==='planos')_planIdMap=idMap;else if(endpoint==='aparelhos')_apIdMap=idMap;else if(endpoint==='acessorios')_accIdMap=idMap;
  tt(`${items.length} importados!`);R();
}catch(e){tt('Erro: '+e.message,'te')}}

async function saveWACfg(){
  S.waConfig.horario=document.getElementById('waH')?.value||S.waConfig.horario;
  S.waConfig.formato=document.getElementById('waF')?.value||S.waConfig.formato;
  S.waConfig.waToken=document.getElementById('waTK')?.value??S.waConfig.waToken;
  S.waConfig.waId=document.getElementById('waID')?.value??S.waConfig.waId;
  try{await api('PUT','/whatsapp/config',{horario:S.waConfig.horario,formato:S.waConfig.formato,wa_token:S.waConfig.waToken,wa_id:S.waConfig.waId})}catch(e){tt('Erro: '+e.message,'te')}
}
window.addWANum=async function(){const v=document.getElementById('waNumI').value.trim().replace(/\D/g,'');if(!v||v.length<10){tt('Numero invalido','te');return}
const nums=[...(S.waConfig.numbers||[])];if(nums.includes(v)){tt('Ja cadastrado','te');return}nums.push(v);
try{await api('PUT','/whatsapp/config',{numbers:nums});S.waConfig.numbers=nums;tt('Adicionado!');R()}catch(e){tt('Erro: '+e.message,'te')}}
window.rmWANum=async function(i){const nums=[...(S.waConfig.numbers||[])];nums.splice(i,1);
try{await api('PUT','/whatsapp/config',{numbers:nums});S.waConfig.numbers=nums;R()}catch(e){tt('Erro: '+e.message,'te')}}
window.toggleWA=async function(){const ativo=!S.waConfig.ativo;
try{await api('PUT','/whatsapp/config',{ativo:ativo?1:0});S.waConfig.ativo=ativo;tt(ativo?'Ativado':'Desativado');R()}catch(e){tt('Erro: '+e.message,'te')}}
window.toggleWAItem=async function(k,v){if(!S.waConfig.reportItems)S.waConfig.reportItems={};S.waConfig.reportItems[k]=v;
try{await api('PUT','/whatsapp/config',{report_items:S.waConfig.reportItems})}catch(e){console.error(e)}}
window.sendWANow=async function(){
  if(!S.waConfig.numbers?.length){tt('Cadastre numeros','te');return}
  if(!S.waConfig.waToken){tt('Configure o Token','te');return}
  if(!S.waConfig.waId){tt('Configure o ID','te');return}
  try{
    const r=await api('POST','/whatsapp/send',{month:cm,year:2026});
    const logs=await api('GET','/whatsapp/logs').catch(()=>[]);S.waLogs=logs;
    tt(r.message||'Enviado!');R();
  }catch(e){
    const detail=e.apiBody?.api_body?JSON.stringify(e.apiBody.api_body):e.message;
    tt('Falha: '+detail,'te');
    console.error('[sendWANow]',e.apiBody||e.message);
    R();
  }
}

  if(token){
    try{
      const data=await api('GET','/auth/me');
      CU={...data.user,_id:data.user.id};
